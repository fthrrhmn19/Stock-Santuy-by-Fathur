[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = true

# Cron Netlify memakai UTC. Konversi WIB: UTC + 7.
[functions."signal-morning"]
  schedule = "0 17 * * 0-4"

[functions."signal-midday"]
  schedule = "0 5 * * 1-5"

[functions."signal-afternoon"]
  schedule = "40 8 * * 1-5"

[functions."signal-watch"]
  schedule = "*/5 2-8 * * 1-5"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-Frame-Options = "DENY"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
