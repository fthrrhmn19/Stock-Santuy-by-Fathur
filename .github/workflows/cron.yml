name: Scheduled API Triggers

on:
  schedule:
    # 00:00 WIB Mon-Fri (17:00 UTC Sun-Thu)
    - cron: '0 17 * * 0-4'
    # 12:00 WIB Mon-Fri (05:00 UTC Mon-Fri)
    - cron: '0 5 * * 1-5'
    # 15:40 WIB Mon-Fri (08:40 UTC Mon-Fri)
    - cron: '40 8 * * 1-5'
    # Every 5 min from 09:00 to 15:55 WIB Mon-Fri (02:00 to 08:55 UTC Mon-Fri)
    - cron: '*/5 2-8 * * 1-5'

jobs:
  ping_endpoints:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Signal Morning
        if: github.event.schedule == '0 17 * * 0-4'
        run: curl -s -X POST -H "X-NF-Event: schedule" https://stock-santuy.pages.dev/api/signal-morning

      - name: Ping Signal Midday
        if: github.event.schedule == '0 5 * * 1-5'
        run: curl -s -X POST -H "X-NF-Event: schedule" https://stock-santuy.pages.dev/api/signal-midday

      - name: Ping Signal Afternoon
        if: github.event.schedule == '40 8 * * 1-5'
        run: curl -s -X POST -H "X-NF-Event: schedule" https://stock-santuy.pages.dev/api/signal-afternoon

      - name: Ping Signal Watch
        if: github.event.schedule == '*/5 2-8 * * 1-5'
        run: curl -s -X POST -H "X-NF-Event: schedule" https://stock-santuy.pages.dev/api/signal-watch
